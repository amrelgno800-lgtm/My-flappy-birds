name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lldd lld cmake openjdk-17-jdk shared-mime-info
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer tools

      - name: Build with Buildozer
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          buildozer android debug
        env:
          ACCEPT_ANDROID_SDK_LICENSES: y

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: bin/*.apk

